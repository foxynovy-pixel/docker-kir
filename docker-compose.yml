version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=dev
      - REDIS_HOST=redis  # Важно: имя сервиса, а не localhost
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started  # Ждем, пока Redis запустится
    volumes:
      - ./app:/app
    networks:
      - app-network
    # Добавляем healthcheck для web сервиса
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --bind 0.0.0.0
    networks:
      - app-network
    # Добавляем healthcheck для Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
 